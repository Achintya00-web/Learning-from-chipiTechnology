<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Layout using Table</title>
</head>
<body style="height: 100vh; margin: 0;">

    <table border="1" width="100%" height="100%">
        
        <tr height="10%">
            <td colspan="2" align="center">
                &lt;header&gt;
            </td>
        </tr>

        <tr height="10%">
            <td colspan="2" align="center">
                &lt;nav&gt;
            </td>
        </tr>

        <tr height="30%">
            <td width="70%" align="center">
                &lt;section&gt;
            </td>
            <td width="30%" rowspan="2" align="center">
                &lt;aside&gt;
            </td>
        </tr>

        <tr height="30%">
            <td width="70%" align="center">
                &lt;article&gt;
            </td>
        </tr>

        <tr height="20%">
            <td colspan="2" align="center">
                &lt;footer&gt;
            </td>
        </tr>

    </table>

</body>
</html>
