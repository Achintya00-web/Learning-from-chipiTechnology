<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Multimedia Elements Demo</title>
</head>
<body>

    <header>
        <h1>HTML5 Multimedia Elements</h1>
        <p>Demonstrating the standard behavior of image, audio, and video tags.</p>
    </header>

    <main>
        <section>
            <h2>1. Image Element (&lt;img&gt;)</h2>
            <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500" alt="Laptop on a desk with code on the screen" width="500">
        </section>

        <section>
            <h2>2. Audio Element (&lt;audio&gt;)</h2>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section>
            <h2>3. Video Element (&lt;video&gt;)</h2>
            <video width="640" height="360" controls>
                <source src="file_example_MP4_480_1_5MG.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Multimedia Learning Hub. All rights reserved.</p>
    </footer>

</body>
</html>
