<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Elements Demo</title>
</head>
<body>

    <header>
        <h1>User Input Demo</h1>
        <p>A simple presentation of labels, textboxes, and buttons inside a form.</p>
    </header>

    <main>
        <form>
            <br>
            <br>
            
            <label for="fname">First Name</label>
            <input type="text" placeholder="Enter the first name" name="firstname" id="fname">
            <br>
            <br>
            
            <label for="lname">Last Name</label>
            <input type="text" placeholder="Enter the last name" name="lastname" id="lname">
            <br>
            <br>

            <input type="reset" value="Cancel">
            <input type="submit" value="Save">
        </form>
    </main>
    <br>
    <label for="feed">give your feedback:</label> <br>
<textarea name="feedback" id="feed"></textarea>
</body>
</html>
