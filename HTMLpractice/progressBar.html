<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Progress Bar Demo</title>
</head>
<body>

    <h2>File Upload Progress</h2>
    <label for="upload">Uploading file...</label><br>
    <progress id="upload" value="50" max="100">50%</progress>

    <h2>Task Completion</h2>
    <label for="task">Steps completed:</label><br>
    <progress id="task" value="3" max="5">3 out of 5</progress>

    <h2>Indeterminate Progress (Loading)</h2>
    <label for="loading">Connecting to server...</label><br>
    <progress  id="loading" ></progress>

</body>
</html>
