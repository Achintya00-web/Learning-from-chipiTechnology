<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Dimensions Demo</title>
</head>
<body>

    <table border="1" width="500" height="200">
        <caption>Weekly Schedule & Dimensions</caption>
        <thead>
            <tr>
                <th>Time / Day</th>
                <th>Monday</th>
                <th>Tuesday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Morning</th>
                <td colspan="2">HTML & CSS Workshop</td>
            </tr>
            <tr>
                <th>Afternoon</th>
                <td rowspan="2">JavaScript Lab</td>
                <td>Project Work</td>
            </tr>
            <tr>
                <th>Evening</th>
                <td>Mentorship Session</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
