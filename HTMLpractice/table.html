<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Demo</title>
</head>
<body>

    <table border="1">
        <caption>Student Learning Tracker</caption>
        
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Current Topic</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ravi</td>
                <td>HTML</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>CSS</td>
            </tr>
            <tr>
                <td>Aarav</td>
                <td>JavaScript</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
