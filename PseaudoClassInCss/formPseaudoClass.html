<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="formPseaudoClass.css">
</head>
<body>
  <h2 class="hstyle" >valid pesaudo class</h2>
  <div class="validForm" >
    <label for="name">Name
      <input type="text" id="name" class="vip">
    </label>
    <br>
    <label for="device">Device
<input type="text" id="device" class="vip" >
    </label>
    <br>
    <label for="email">Email
      <input type="email" id="email" class="vip">
    </label>
    <br>
    <label for="password">Password
      <input type="password" id="password" class="vip">
    </label>
  </div>
  <h2 class="hstyle" >invalid pseaudo class</h2>
  <div class="validForm" >
    <label for="name">Name
      <input type="text" id="name" class="vip">
    </label>
    <br>
    <label for="device">Device
<input type="text" id="device" class="vip" >
    </label>
    <br>
    <label for="email">Email
      <input type="email" id="email" class="vip">
    </label>
    <br>
    <label for="password">Password
      <input type="password" id="password" class="vip">
    </label>
    
  </div>
  <h2 class="hstyle" >required pseaudo class</h2>
  <div class="validForm" >
    <label for="name">Name
      <input type="text" id="name" class="vip">
    </label>
    <br>
    <label for="device">Device
<input type="text" id="device" class="vip" >
    </label>
    <br>
    <label for="email">Email
      <input type="email" id="email" class="vip">
    </label>
    <br>
    <label for="password">Password
      <input type="password" id="password" class="vip" required>
    </label>
    
  </div>

   <h2 class="hstyle">optional pseaudo class</h2>
  <div class="validForm" >
    <label for="name">Name
      <input type="text" id="name" class="vip" required>
    </label>
    <br>
    <label for="device">Device
<input type="text" id="device" class="vip" >
    </label>
    <br>
    <label for="email">Email
      <input type="email" id="email" class="vip" required>
    </label>
    <br>
    <label for="password">Password
      <input type="password" id="password" class="vip" required>
    </label>
  </div>
  <h2 class="hstyle" >in-range & out-of-range</h2>
  <div class="validForm" >
    <label for="age">Age
      <input type="number" min="18" max="30" value="20" id="age" >
    </label>
  </div>
</body>
</html>
