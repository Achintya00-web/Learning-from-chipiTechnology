<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="detailsStyling.css">
</head>
<body>
  <h2>styling content of detail tag</h2>
  <details class="styling-detail-content" >
    <summary>List of Subjects</summary>
    <ul>
      <li>Maths</li>
      <li>Physics</li>
      <li>Quantum Computing </li>
    </ul>
  </details>
  <h2>styling on file selector button</h2>
  <label for="idProof">Upload a id proof
    <input type="file" id="idProof">
  </label>
  <h2>styling on placeholder</h2>
  <label for="food">Dish
    <input type="text" placeholder="Name of dish" id="food" >
  </label>
</body>
</html>
